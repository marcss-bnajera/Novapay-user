version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: novapay_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: novapay_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app-user:
    build: .
    container_name: novapay_app_user
    ports:
      - "3002:3002"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_NAME: novapay_db
      DB_PORT: 5432
      DB_DIALECT: postgres
    depends_on:
      - db

volumes:
  postgres_data:
